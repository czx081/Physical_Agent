project:
  name: quickstart

workspace:
  path: ./workspace

watch:
  tick_ms: 500
  require_human_approval: false

agent:
  planner: rule_based
  model: fake/local
  max_steps: 8
  feedback_timeout_s: 30

robots:
  arm_1:
    driver: mock_arm
    config:
      bounds:
        x: [-1.0, 1.0]
        y: [-1.0, 1.0]
        z: [0.0, 1.0]
      objects:
        red_block:
          type: block
          color: red
          location: table
          pose: {x: 0.3, y: 0.1, z: 0.0}
        tray:
          type: tray
          location: table
          pose: {x: -0.2, y: 0.2, z: 0.0}

  rover_1:
    driver: mock_rover
    config:
      start_pose:
        x: 0.0
        y: 0.0

