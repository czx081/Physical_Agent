schema: physical-agent/driver/v1

name: xiaozhi_mcp_hardware
version: 0.1.0
description: Local hardware example for a Xiaozhi MCP bridge.

entrypoint:
  module: driver
  class: XiaozhiMcpDriver

robot:
  kind: mcp_device
  supports_simulation: true

config_schema:
  type: object
  properties:
    mode:
      type: string
      enum: [mock, http, ws]
      default: mock
    endpoint_env:
      type: string
      default: XIAOZHI_MCP_ENDPOINT
    token_env:
      type: string
      default: XIAOZHI_MCP_TOKEN
    ws_url_env:
      type: string
      default: XIAOZHI_MCP_URL
    host_env:
      type: string
      default: XIAOZHI_MCP_HOST
    port_env:
      type: string
      default: XIAOZHI_MCP_PORT
    path_env:
      type: string
      default: XIAOZHI_MCP_PATH
    timeout_s:
      type: number
      minimum: 1
      default: 10
    connect_timeout_s:
      type: number
      minimum: 0.1
      default: 2
    wait_for_responses:
      type: boolean
      default: true
    device_name:
      type: string
      default: xiaozhi-device
    tool_prefix:
      type: string
      default: self.device
    url:
      type: string
    host:
      type: string
    port:
      type: integer
      minimum: 1
      maximum: 65535
    path:
      type: string
    tools:
      type: object
      properties:
        observe:
          type: string
        set_volume:
          type: string
        otto_action:
          type: string
        home:
          type: string
        stop:
          type: string
      additionalProperties:
        type: string
    mock_state:
      type: object
  additionalProperties: false

dependencies:
  python: []

capability_contract:
  source: runtime
